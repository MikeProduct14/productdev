<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест API</title>
<style>
body { font-family: sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
button { padding: 0.5rem 1rem; margin: 0.5rem; cursor: pointer; }
#log { background: #f5f5f5; padding: 1rem; border-radius: 4px; margin-top: 1rem; white-space: pre-wrap; font-family: monospace; font-size: 0.875rem; }
</style>
</head>
<body>
<h1>🧪 Тест API Vibecodify</h1>

<h2>1. Health Check</h2>
<button onclick="testHealth()">GET /health</button>

<h2>2. Создать заявку</h2>
<button onclick="testCreateLead()">POST /api/leads</button>

<h2>3. Получить заявки</h2>
<button onclick="testGetLeads()">GET /api/leads</button>

<h2>4. Тест формы</h2>
<input type="text" id="testName" placeholder="Имя" value="Тестовый пользователь">
<input type="text" id="testPhone" placeholder="Телефон" value="@test">
<button onclick="testFormSubmit()">Отправить форму</button>

<div id="log"></div>

<script>
const log = document.getElementById('log');

function addLog(msg) {
  const time = new Date().toLocaleTimeString();
  log.textContent += `[${time}] ${msg}\n`;
}

async function testHealth() {
  addLog('Проверка health check...');
  try {
    const res = await fetch('/health');
    const data = await res.json();
    addLog(`✓ Health: ${JSON.stringify(data)}`);
  } catch (err) {
    addLog(`✗ Ошибка: ${err.message}`);
  }
}

async function testCreateLead() {
  addLog('Создание тестовой заявки...');
  try {
    const res = await fetch('/api/leads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: 'Тест ' + Date.now(),
        phone: '@test',
        company: 'Test Company',
        task: 'Тестовая задача'
      })
    });
    const data = await res.json();
    addLog(`✓ Создано: ${JSON.stringify(data)}`);
  } catch (err) {
    addLog(`✗ Ошибка: ${err.message}`);
  }
}

async function testGetLeads() {
  addLog('Получение списка заявок...');
  try {
    const res = await fetch('/api/leads');
    const data = await res.json();
    addLog(`✓ Получено заявок: ${data.length}`);
    addLog(JSON.stringify(data, null, 2));
  } catch (err) {
    addLog(`✗ Ошибка: ${err.message}`);
  }
}

async function testFormSubmit() {
  const name = document.getElementById('testName').value;
  const phone = document.getElementById('testPhone').value;
  
  addLog(`Отправка формы: ${name}, ${phone}`);
  try {
    const res = await fetch('/api/leads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, company: '', task: '' })
    });
    
    if (res.ok) {
      const data = await res.json();
      addLog(`✓ Форма отправлена: ${JSON.stringify(data)}`);
    } else {
      addLog(`✗ Ошибка ${res.status}: ${await res.text()}`);
    }
  } catch (err) {
    addLog(`✗ Ошибка: ${err.message}`);
  }
}

addLog('Тестовая страница загружена');
</script>
</body>
</html>
