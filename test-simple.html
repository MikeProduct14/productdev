<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Простой тест формы</title>
<style>
body { font-family: sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; }
input, textarea { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
button { padding: 0.75rem 1.5rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
button:disabled { opacity: 0.5; }
.success { background: #d1fae5; padding: 1rem; border-radius: 4px; margin-top: 1rem; display: none; }
#log { background: #f5f5f5; padding: 1rem; margin-top: 1rem; font-family: monospace; font-size: 0.875rem; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>Тест формы заявки</h1>

<form id="testForm">
  <input type="text" id="name" placeholder="Имя" required>
  <input type="text" id="phone" placeholder="Телефон">
  <input type="text" id="company" placeholder="Компания">
  <textarea id="task" placeholder="Задача"></textarea>
  <button type="submit" id="submitBtn">Отправить</button>
</form>

<div class="success" id="success">✓ Заявка отправлена!</div>
<div id="log"></div>

<script>
const log = document.getElementById('log');

function addLog(msg) {
  log.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
}

addLog('Страница загружена');

document.getElementById('testForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  addLog('Форма отправляется...');
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Отправка...';
  
  const data = {
    name: document.getElementById('name').value,
    phone: document.getElementById('phone').value,
    company: document.getElementById('company').value,
    task: document.getElementById('task').value
  };
  
  addLog('Данные: ' + JSON.stringify(data));
  
  try {
    const res = await fetch('/api/leads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    addLog(`Ответ: ${res.status} ${res.statusText}`);
    
    if (res.ok) {
      const result = await res.json();
      addLog('Успех: ' + JSON.stringify(result));
      document.getElementById('success').style.display = 'block';
      document.getElementById('testForm').reset();
    } else {
      const error = await res.text();
      addLog('Ошибка: ' + error);
      alert('Ошибка: ' + res.status);
    }
  } catch (err) {
    addLog('Исключение: ' + err.message);
    alert('Ошибка сети: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Отправить';
  }
});
</script>
</body>
</html>
